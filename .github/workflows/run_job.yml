name: Micro Saas Running Job

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit Apps
        run: |
          urls=(
            "https://crash-log-analyzer.streamlit.app"
            "https://logcat-error-filter.streamlit.app"
            "https://stack-trace-root-cause-finder.streamlit.app"
            "https://api-error-parser.streamlit.app"
            "https://log-diff-analyzer.streamlit.app"
          )

          for url in "${urls[@]}"; do
            echo "Pinging $url"
            status=$(curl -L -A "Mozilla/5.0" -o /dev/null -s --max-time 30 -w "%{http_code}" "$url")
            echo "Done"
          done
